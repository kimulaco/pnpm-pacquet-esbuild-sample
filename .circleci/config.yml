version: 2.1

jobs:
  test:
    docker:
      - image: cimg/node:24.14
    steps:
      - checkout

      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm@11.2.1

      - restore_cache:
          keys:
            - pnpm-{{ checksum "pnpm-lock.yaml" }}

      - run:
          name: Install dependencies
          command: pnpm i

      - save_cache:
          key: pnpm-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - node_modules
            - packages/pkg-a/node_modules
            - packages/pkg-b/node_modules

      - run:
          name: Debug esbuild binary permissions
          command: |
            BIN=$(find node_modules/.pnpm -path "*/bin/esbuild" -not -name "*.js" 2>/dev/null | head -1)
            if [ -z "$BIN" ]; then
              echo "esbuild binary not found"
            else
              echo "Path: $BIN"
              ls -la "$BIN"
              stat "$BIN"
              df -T "$(dirname "$BIN")"
            fi
            mount | grep noexec | head -5 || true

      - run:
          name: Test
          command: pnpm test

workflows:
  test:
    jobs:
      - test
